<svg width="900" height="260" viewBox="0 0 900 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="xyGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#7A5CFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="900" height="260" rx="24" fill="#0B1020"/>
  <g transform="translate(70 55)" filter="url(#glow)">
    <polygon points="70,0 140,40 140,120 70,160 0,120 0,40" stroke="url(#xyGradient)" stroke-width="8" fill="rgba(255,255,255,0.02)"/>
    <path d="M35 40 L105 120" stroke="#00F0FF" stroke-width="10" stroke-linecap="round"/>
    <path d="M105 40 L35 120" stroke="#7A5CFF" stroke-width="10" stroke-linecap="round"/>
    <circle cx="70" cy="0" r="6" fill="#00F0FF"/>
    <circle cx="140" cy="40" r="6" fill="#7A5CFF"/>
    <circle cx="140" cy="120" r="6" fill="#00F0FF"/>
    <circle cx="70" cy="160" r="6" fill="#7A5CFF"/>
    <circle cx="0" cy="120" r="6" fill="#00F0FF"/>
    <circle cx="0" cy="40" r="6" fill="#7A5CFF"/>
  </g>
  <text x="270" y="120" fill="white" font-size="64" font-family="Segoe UI, Ubuntu, sans-serif" font-weight="700" letter-spacing="2">Xyther<tspan fill="url(#xyGradient)">QL</tspan></text>
  <text x="272" y="165" fill="#8FA3BF" font-size="22" font-family="Segoe UI, Ubuntu, sans-serif" letter-spacing="4">GRAPHQL SECURITY AUDITING TOOL</text>
  <line x1="270" y1="190" x2="760" y2="190" stroke="url(#xyGradient)" stroke-width="3" opacity="0.7"/>
</svg>
